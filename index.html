              {
                "@type": "Question",
                "name": "Are my files uploaded to a server?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. Every operation in AuroraPDF runs 100% in your browser using WebAssembly and modern browser APIs. Your files never leave your device and are never sent to any server."
                }
              },
              {
                "@type": "Question",
                "name": "Is AuroraPDF free to use?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes, AuroraPDF is completely free. There are no subscriptions, no paywalls, and no hidden fees. All tools are available to everyone at no cost."
                }
              },
              {
                "@type": "Question",
                "name": "Can I use AuroraPDF offline?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. AuroraPDF is a Progressive Web App (PWA). After your first visit, the app and all its tools are cached locally and work without an internet connection. You can install it to your home screen for quick access."
                }
              },
              {
                "@type": "Question",
                "name": "What PDF tools does AuroraPDF offer?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "AuroraPDF offers a comprehensive suite of PDF tools including: Compress PDF, Edit PDF, Sign PDF, Add Watermark, Organize PDF, Split PDF, Protect PDF, OCR to PDF, Searchable PDF OCR, PDF to JPG, PDF to Word, Word to PDF, PDF to Excel, Excel to PDF, HTML to PDF, and many more. All tools run entirely in your browser."
                }
              },
              {
                "@type": "Question",
                "name": "Does AuroraPDF work on mobile?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. AuroraPDF is fully responsive and works on smartphones and tablets. You can also install it as a PWA on your mobile device for an app-like experience. Touch events are fully supported for tools that require interaction with PDF pages."
                }
              },
              {
                "@type": "Question",
                "name": "How does the Searchable PDF OCR tool work?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "The Searchable PDF OCR tool uses Tesseract.js — an open-source OCR engine compiled to WebAssembly — to analyse image-based PDF pages entirely in your browser. It detects text in scanned images and embeds an invisible text layer into the PDF, making the content searchable and selectable without uploading your file anywhere."
                }
              },
              {
                "@type": "Question",
                "name": "Who built AuroraPDF?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "AuroraPDF was built by Muhammad Bintang Al Akbar (Stareezy), a Front End Engineer. It was created out of frustration with PDF tools that upload your files to remote servers. You can learn more on the About page or visit the portfolio at stareezy.tech."
                }
